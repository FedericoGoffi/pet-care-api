spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/petcare?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

jwt.secret=${JWT_SECRET:dev-secret-local-minimo-32-caracteres-aqui}

app.admin.password=${APP_ADMIN_PASSWORD:CambiaEstoEnProd!99}
app.vet.password=${APP_VET_PASSWORD:CambiaEstoEnProd!88}
app.user.password=${APP_USER_PASSWORD:CambiaEstoEnProd!77}